<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Davidson College Trivia</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Caslon+Text:wght@400;700&family=Inter:wght@400;500;600;700&family=Archivo+SemiExpanded:wght@600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #fff; font-family: 'Inter', Helvetica, sans-serif; color: #0F1012; }

  .trivia-embed { background: #fff; border: 1px solid #D4CFCE; border-radius: 4px; overflow: hidden; }

  /* Decade tabs */
  .decade-strip { border-bottom: 1px solid #D4CFCE; display: flex; align-items: stretch; flex-wrap: wrap; }
  .decade-tab {
    flex: 1 1 0; min-width: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; text-align: center;
    padding: 0.75rem 0.4rem 0.6rem; border-right: 1px solid #D4CFCE;
    border-bottom: 1px solid #D4CFCE;
    cursor: pointer; transition: background 0.15s; position: relative;
  }
  .decade-tab:last-child { border-right: none; }
  .decade-tab:hover { background: #F9F5F2; }
  .decade-tab .eyebrow { font-family: 'Archivo SemiExpanded', Helvetica, sans-serif; font-size: 0.6rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: #B0ABAB; margin-bottom: 0.3rem; }
  .decade-tab .label { font-family: 'Archivo SemiExpanded', Helvetica, sans-serif; font-size: clamp(0.75rem, 2vw, 1.15rem); font-weight: 700; color: #294878; line-height: 1; }
  .decade-tab.active::after { content: ''; position: absolute; bottom: -1px; left: 0; right: 0; height: 3px; background: #D42121; }
  .decade-tab.active .label { color: #D42121; }
  .decade-tab.active .eyebrow { color: #D42121; opacity: 0.7; }
  .decade-tab.lucky { background: #2d2b7b; }
  .decade-tab.lucky .eyebrow { color: #F5C518; }
  .decade-tab.lucky .label { color: #F5C518; font-size: clamp(1rem, 2.5vw, 1.4rem); }
  .decade-tab.lucky:hover { background: #23216a; }
  @media (max-width: 480px) {
    .decade-tab { flex: 1 1 25%; }
    .decade-tab .eyebrow { display: none; }
    .decade-tab.lucky .eyebrow { display: none; }
  }

  /* Loading / error */
  .loading-msg { padding: 3rem 2rem; text-align: center; font-family: 'Archivo SemiExpanded', Helvetica, sans-serif; font-size: 0.75rem; letter-spacing: 0.12em; text-transform: uppercase; color: #9F8B76; }
  .error-msg { padding: 3rem 2rem; text-align: center; color: #C8251A; font-size: 0.9rem; line-height: 1.6; }

  /* Question */
  .question-zone { background: #F9F5F2; padding: 1.75rem 2.5rem; min-height: 110px; display: flex; align-items: center; }
  .question-counter { font-family: 'Archivo SemiExpanded', Helvetica, sans-serif; font-size: 0.65rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: #9F8B76; margin-bottom: 0.6rem; }
  .question-text { font-family: 'Libre Caslon Text', Georgia, serif; font-size: 1.2rem; font-weight: 400; color: #0F1012; line-height: 1.55; }

  /* Answer rows */
  .answer-zone { padding: 1.25rem 2.5rem 0; background: #fff; }
  .answer-list { display: flex; flex-direction: column; gap: 0.6rem; }
  .answer-row {
    display: flex; align-items: center; gap: 0.85rem;
    padding: 0.8rem 1rem; border: 1.5px solid #D4CFCE; border-radius: 6px;
    background: #fff; cursor: pointer; transition: border-color 0.15s, background 0.15s;
    user-select: none;
  }
  .answer-row:hover { border-color: #8D898A; background: #F9F5F2; }
  .answer-row.selected { border-color: #294878; background: #F0F4FA; }
  .answer-row.correct { border-color: #1DB87A; background: #EAFFF7; cursor: default; }
  .answer-row.incorrect { border-color: #C8251A; background: #FFF0EE; cursor: default; }
  .answer-row.revealed { cursor: default; }
  .answer-row.revealed:hover { border-color: #D4CFCE; background: #fff; }
  .answer-row.correct:hover { border-color: #1DB87A; background: #EAFFF7; }
  .answer-row.incorrect:hover { border-color: #C8251A; background: #FFF0EE; }

  .radio-circle {
    width: 20px; height: 20px; border-radius: 50%; border: 2px solid #D4CFCE;
    flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    transition: border-color 0.15s, background 0.15s; font-size: 0.65rem; font-weight: 700; color: #fff;
  }
  .answer-row.selected .radio-circle { border-color: #294878; background: #294878; }
  .answer-row.selected .radio-circle::after { content: ''; width: 8px; height: 8px; border-radius: 50%; background: #fff; display: block; }
  .answer-row.correct .radio-circle { border-color: #1DB87A; background: #1DB87A; }
  .answer-row.correct .radio-circle::after { content: '✓'; }
  .answer-row.incorrect .radio-circle { border-color: #C8251A; background: #C8251A; }
  .answer-row.incorrect .radio-circle::after { content: '✕'; }
  .answer-row-text { font-family: 'Inter', Helvetica, sans-serif; font-size: 0.9rem; font-weight: 500; color: #0F1012; line-height: 1.4; }
  .answer-row.incorrect .answer-row-text { text-decoration: line-through; color: #8D898A; }

  /* Feedback */
  .feedback-panel {
    margin: 1rem 2.5rem 0; padding: 0.9rem 1rem; border-radius: 6px;
    display: none; align-items: center; gap: 0.85rem; border: 1.5px solid transparent;
  }
  .feedback-panel.visible { display: flex; }
  .feedback-panel.correct-feedback { background: #F9F5F2; border-color: #9F8B76; }
  .feedback-panel.incorrect-feedback { background: #F9F5F2; border-color: #9F8B76; }
  .feedback-icon { font-size: 1.3rem; flex-shrink: 0; }
  .feedback-label { font-family: 'Archivo SemiExpanded', Helvetica, sans-serif; font-size: 0.72rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #9F8B76; margin-bottom: 0.15rem; }
  .feedback-detail { font-size: 0.82rem; color: #4A484A; line-height: 1.4; }

  /* Footer */
  .game-footer { padding: 1rem 2.5rem 1.5rem; background: #fff; }
  .progress-row { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.85rem; }
  .progress-bar-wrap { flex: 1; height: 5px; background: #D4CFCE; border-radius: 3px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: #1DB87A; border-radius: 3px; transition: width 0.4s ease; }
  .progress-label { font-size: 0.7rem; font-weight: 600; color: #9F8B76; white-space: nowrap; }
  .check-btn {
    width: 100%; padding: 0.9rem; border-radius: 6px; border: none;
    font-family: 'Archivo SemiExpanded', Helvetica, sans-serif;
    font-size: 0.9rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
    cursor: pointer; transition: background 0.2s;
  }
  .check-btn.inactive { background: #DCDCDC; color: #8D898A; cursor: default; }
  .check-btn.ready { background: #D42121; color: #fff; }
  .check-btn.next-q { background: #D42121; color: #fff; }

  /* Score screen */
  .score-screen { display: none; flex-direction: column; align-items: center; justify-content: center; padding: 2rem 2rem 2.5rem; text-align: center; min-height: 300px; }
  .score-screen.visible { display: flex; }
  .score-gif { width: 180px; height: 180px; object-fit: cover; border-radius: 50%; margin-bottom: 1.25rem; }
  .score-big { font-family: 'Libre Caslon Text', Georgia, serif; font-size: 4rem; font-weight: 700; color: #D42121; line-height: 1; margin-bottom: 0.5rem; }
  .score-sub { font-family: 'Archivo SemiExpanded', Helvetica, sans-serif; font-size: 0.75rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: #9F8B76; margin-bottom: 1.25rem; }
  .score-msg { font-family: 'Libre Caslon Text', Georgia, serif; font-size: 1.15rem; color: #0F1012; margin-bottom: 2rem; max-width: 420px; line-height: 1.55; }
  .restart-btn { padding: 0.75rem 2rem; border-radius: 6px; border: none; background: #294878; color: #fff; font-family: 'Archivo SemiExpanded', Helvetica, sans-serif; font-size: 0.85rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer; margin-bottom: 1.5rem; }
  .restart-btn:hover { background: #1e3560; }
  .share-row { display: flex; align-items: center; gap: 0.6rem; }
  .share-label { font-family: 'Archivo SemiExpanded', Helvetica, sans-serif; font-size: 0.65rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: #B0ABAB; }
  .share-btn {
    width: 36px; height: 36px; border-radius: 50%; border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: opacity 0.15s; flex-shrink: 0;
  }
  .share-btn:hover { opacity: 0.82; }
  .share-btn svg { width: 16px; height: 16px; fill: #fff; }
  .share-btn-x { background: #000; }
  .share-btn-fb { background: #1877F2; }
  .share-btn-li { background: #0A66C2; }
</style>
</head>
<body>

<div class="trivia-embed">
  <div class="decade-strip" id="decade-strip"></div>

  <div id="loading-area" class="loading-msg">Loading questions…</div>

  <div id="game-area" style="display:none;">
    <div class="question-zone">
      <div>
        <p class="question-counter" id="q-counter"></p>
        <p class="question-text" id="q-text"></p>
      </div>
    </div>
    <div class="answer-zone">
      <div class="answer-list" id="answer-list"></div>
    </div>
    <div class="feedback-panel" id="feedback-panel">
      <div class="feedback-icon" id="feedback-icon"></div>
      <div>
        <p class="feedback-label" id="feedback-label"></p>
        <p class="feedback-detail" id="feedback-detail"></p>
      </div>
    </div>
    <div class="game-footer">
      <div class="progress-row">
        <span class="progress-label" id="progress-label"></span>
        <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progress-bar" style="width:0%"></div></div>
      </div>
      <button class="check-btn inactive" id="check-btn">Check</button>
    </div>
  </div>

  <div class="score-screen" id="score-screen">
    <img class="score-gif" id="score-gif" src="" alt="Celebration" />
    <p class="score-big" id="score-big"></p>
    <p class="score-sub">Correct answers</p>
    <p class="score-msg" id="score-msg"></p>
    <button class="restart-btn" id="restart-btn">Try Another Decade</button>
    <div class="share-row">
      <span class="share-label">Share</span>
      <button class="share-btn share-btn-x" onclick="shareX()" title="Share on X">
        <svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.737-8.835L1.254 2.25H8.08l4.253 5.622 5.911-5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
      </button>
      <button class="share-btn share-btn-fb" onclick="shareFacebook()" title="Share on Facebook">
        <svg viewBox="0 0 24 24"><path d="M24 12.073C24 5.405 18.627 0 12 0S0 5.405 0 12.073C0 18.1 4.388 23.094 10.125 24v-8.437H7.078v-3.49h3.047V9.41c0-3.025 1.792-4.697 4.533-4.697 1.312 0 2.686.236 2.686.236v2.97h-1.514c-1.491 0-1.956.931-1.956 1.886v2.268h3.328l-.532 3.49h-2.796V24C19.612 23.094 24 18.1 24 12.073z"/></svg>
      </button>
      <button class="share-btn share-btn-li" onclick="shareLinkedIn()" title="Share on LinkedIn">
        <svg viewBox="0 0 24 24"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
      </button>
    </div>
  </div>
</div>

<script>
var QUIZ_URL = window.location.href;

var CELEBRATE_GIFS = [
  'https://media.giphy.com/media/artj92V8o75VPL7AeQ/giphy.gif',  // confetti burst
  'https://media.giphy.com/media/26u4lOMA8JKSnL9Uk/giphy.gif',  // celebration
  'https://media.giphy.com/media/l0MYGb1LuZ3n7dRnO/giphy.gif',  // happy dance
];
var GOOD_GIFS = [
  'https://media.giphy.com/media/3o7abKhOpu0NwenH3O/giphy.gif',
  'https://media.giphy.com/media/xT9IgG50Lg7russbBu/giphy.gif',
];
var MEH_GIFS = [
  'https://media.giphy.com/media/l2JehQ2GitHGdVG9y/giphy.gif',
  'https://media.giphy.com/media/3o7TKSjRrfIPjeiVyM/giphy.gif',
];

function pickGif(pct) {
  var pool = pct === 1 ? CELEBRATE_GIFS : pct >= 0.5 ? GOOD_GIFS : MEH_GIFS;
  return pool[Math.floor(Math.random() * pool.length)];
}

function getShareText() {
  var sc = score, tot = questions.length;
  var decade = categories[currentDecade] ? categories[currentDecade].name : '';
  return 'I scored ' + sc + '/' + tot + ' on the Davidson ' + decade + ' Decades Quiz! How well do you know Davidson history? ' + QUIZ_URL;
}
function shareX() { window.open('https://twitter.com/intent/tweet?text=' + encodeURIComponent(getShareText()), '_blank'); }
function shareFacebook() { window.open('https://www.facebook.com/sharer/sharer.php?u=' + encodeURIComponent(QUIZ_URL) + '&quote=' + encodeURIComponent(getShareText()), '_blank'); }
function shareLinkedIn() { window.open('https://www.linkedin.com/sharing/share-offsite/?url=' + encodeURIComponent(QUIZ_URL), '_blank'); }

var SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSU9oMj75iSElaN3gsiYUoeALmitGhcEOFq4SvI-fsXDXirv9U6hyxSEAjsPc0FStrmoA5z7VLo1Qy6/pub?gid=0&single=true&output=csv";

var categories = [];        // [{ name, questions: [{q, choices, answer}] }]
var currentDecade = null;   // index into categories
var questions = [];         // active shuffled question list
var qIndex = 0, score = 0, selectedIndex = null, checked = false;

/* ── CSV helpers (from functionality file) ── */
function parseCSV(text) {
  var lines = text.trim().split('\n');
  var headers = lines[0].split(',').map(function(h) { return h.trim().toLowerCase().replace(/"/g, ''); });
  return lines.slice(1).map(function(line) {
    var cols = [], cur = '', inQ = false;
    for (var i = 0; i < line.length; i++) {
      var ch = line[i];
      if (ch === '"') { inQ = !inQ; }
      else if (ch === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
      else { cur += ch; }
    }
    cols.push(cur.trim());
    var row = {};
    headers.forEach(function(h, i) { row[h] = (cols[i] || '').replace(/^"|"$/g, '').trim(); });
    return row;
  }).filter(function(r) { return r.decade && r.question; });
}

function buildCategories(rows) {
  var map = {}, order = [];
  rows.forEach(function(row) {
    var d = row.decade.trim();
    if (!map[d]) { map[d] = []; order.push(d); }
    var ai = ['A','B','C','D'].indexOf((row.correct || 'A').trim().toUpperCase());
    // explanation column is optional
    map[d].push({
      q: row.question,
      choices: [row.choice_a, row.choice_b, row.choice_c, row.choice_d],
      answer: ai >= 0 ? ai : 0,
      explanation: row.explanation || ''
    });
  });
  return order.map(function(d) { return { name: d, questions: map[d] }; });
}

/* ── Sheet loader ── */
function loadSheet() {
  fetch(SHEET_CSV_URL)
    .then(function(r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.text(); })
    .then(function(text) {
      var rows = parseCSV(text);
      if (!rows.length) throw new Error('No data rows found.');
      categories = buildCategories(rows);
      document.getElementById('loading-area').style.display = 'none';
      buildTabs();
      // Auto-select the first decade so the game is ready to play
      selectDecade(0);
    })
    .catch(function(e) {
      document.getElementById('loading-area').className = 'error-msg';
      document.getElementById('loading-area').innerHTML = 'Could not load questions.<br><small>' + e.message + '</small>';
    });
}

/* ── Shuffle ── */
function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}

/* ── Tabs ── */
function buildTabs() {
  var strip = document.getElementById('decade-strip');
  strip.innerHTML = '';
  categories.forEach(function(cat, i) {
    var tab = document.createElement('div');
    tab.className = 'decade-tab' + (i === currentDecade ? ' active' : '');
    tab.innerHTML = '<span class="eyebrow">Decade</span><span class="label">' + cat.name + '</span>';
    tab.addEventListener('click', function() { selectDecade(i); });
    strip.appendChild(tab);
  });
  var lucky = document.createElement('div');
  lucky.className = 'decade-tab lucky';
  lucky.innerHTML = '<span class="eyebrow">Feeling Lucky?</span><span class="label">★</span>';
  lucky.addEventListener('click', function() { selectDecade(Math.floor(Math.random() * categories.length)); });
  strip.appendChild(lucky);
}

function selectDecade(i) {
  currentDecade = i;
  questions = shuffle(categories[i].questions);
  qIndex = 0; score = 0;
  buildTabs();
  document.getElementById('game-area').style.display = 'block';
  document.getElementById('score-screen').classList.remove('visible');
  loadQuestion();
}

/* ── Question flow ── */
function loadQuestion() {
  selectedIndex = null; checked = false;
  var q = questions[qIndex];
  var total = questions.length;
  document.getElementById('q-counter').textContent = 'Question ' + (qIndex + 1) + ' of ' + total;
  document.getElementById('q-text').textContent = q.q;
  document.getElementById('progress-label').textContent = (qIndex + 1) + ' / ' + total;
  document.getElementById('progress-bar').style.width = ((qIndex / total) * 100) + '%';

  var list = document.getElementById('answer-list');
  list.innerHTML = '';
  q.choices.forEach(function(a, i) {
    var row = document.createElement('div');
    row.className = 'answer-row';
    row.innerHTML = '<div class="radio-circle"></div><span class="answer-row-text">' + a + '</span>';
    row.addEventListener('click', function() { selectAnswer(i); });
    list.appendChild(row);
  });

  document.getElementById('feedback-panel').className = 'feedback-panel';
  var btn = document.getElementById('check-btn');
  btn.className = 'check-btn inactive';
  btn.textContent = 'Check';
  btn.onclick = null;
}

function selectAnswer(i) {
  if (checked) return;
  selectedIndex = i;
  document.querySelectorAll('.answer-row').forEach(function(r, idx) {
    r.className = 'answer-row' + (idx === i ? ' selected' : '');
  });
  var btn = document.getElementById('check-btn');
  btn.className = 'check-btn ready';
  btn.onclick = checkAnswer;
}

function checkAnswer() {
  if (checked || selectedIndex === null) return;
  checked = true;
  var q = questions[qIndex];
  var isCorrect = selectedIndex === q.answer;
  if (isCorrect) score++;

  document.querySelectorAll('.answer-row').forEach(function(r, i) {
    if (i === q.answer) r.className = 'answer-row correct';
    else if (i === selectedIndex) r.className = 'answer-row incorrect';
    else r.className = 'answer-row revealed';
  });

  var panel = document.getElementById('feedback-panel');
  panel.className = 'feedback-panel visible ' + (isCorrect ? 'correct-feedback' : 'incorrect-feedback');
  document.getElementById('feedback-icon').textContent = isCorrect ? '✅' : '❌';
  document.getElementById('feedback-label').textContent = isCorrect ? 'Correct!' : 'Not quite.';
  document.getElementById('feedback-detail').textContent = q.explanation;

  var btn = document.getElementById('check-btn');
  btn.className = 'check-btn next-q';
  btn.textContent = qIndex + 1 < questions.length ? 'Next →' : 'See Results';
  btn.onclick = nextQuestion;
}

function nextQuestion() {
  qIndex++;
  if (qIndex < questions.length) {
    loadQuestion();
  } else {
    document.getElementById('game-area').style.display = 'none';
    var total = questions.length;
    var pct = score / total;
    document.getElementById('score-gif').src = pickGif(pct);
    document.getElementById('score-big').textContent = score + '/' + total;
    document.getElementById('score-msg').textContent =
      pct === 1 ? 'Perfect score — you really know your Davidson history.' :
      pct >= 0.7 ? 'Solid showing. A true Wildcat at heart.' :
      pct >= 0.4 ? 'Not bad — a few more visits to the archives might help.' :
      'Room to grow. Davidson history runs deep!';
    document.getElementById('score-screen').classList.add('visible');
    document.getElementById('restart-btn').onclick = function() { selectDecade(currentDecade); };
  }
}

loadSheet();
</script>
</body>
</html>
