<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Davidson College Trivia</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Caslon+Text:wght@400;700&family=Inter:wght@400;500;600;700&family=Archivo+SemiExpanded:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { margin: 0; padding: 0; }
  body { background: #fff; font-family: 'Inter', Helvetica, sans-serif; color: #0F1012; }
  .trivia-embed { background: #fff; }
  .trivia-game-card { border: 1px solid #D4CFCE; border-radius: 4px; overflow: hidden; display: flex; flex-direction: column; }
  .score-screen.visible { display: flex; flex: 1; }

  /* Decade selection screen */
  .decade-nav { display: none; flex-direction: column; align-items: center; justify-content: center; padding: 3rem 2rem; gap: 1.5rem; }
  .decade-nav.visible { display: flex; }
  .decade-nav-heading { font-family: 'Archivo SemiExpanded', Helvetica, sans-serif; font-size: clamp(0.65rem, 2vw, 0.8rem); font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: #9F8B76; }
  .decade-pills { display: flex; flex-wrap: wrap; gap: 0.65rem; justify-content: center; width: 100%; }
  .decade-pill {
    font-family: 'Archivo SemiExpanded', Helvetica, sans-serif; font-size: clamp(1rem, 3.5vw, 1.25rem); font-weight: 700;
    letter-spacing: 0.04em; padding: 0.85rem 1.75rem; border-radius: 999px;
    border: 1.5px solid #D4CFCE; background: #fff; color: #294878;
    cursor: pointer; transition: border-color 0.15s, background 0.15s, color 0.15s;
    white-space: nowrap; line-height: 1.4;
  }
  @media (max-width: 600px) {
    .decade-pills { display: grid; grid-template-columns: 1fr 1fr; }
    .decade-pill { text-align: center; padding: 0.85rem 0.5rem; font-size: 1.2rem; }
  }
  .decade-pill:hover { border-color: #294878; background: #F0F4FA; }
  /* Persistent chrome bar shown on postcard / quiz / results */
  .quiz-chrome { display: none; align-items: center; gap: 1rem; padding: 0.85rem 1.25rem; border-bottom: 1px solid #D4CFCE; background: #fff; }
  .quiz-chrome.visible { display: flex; }
.quiz-chrome-progress { flex: 1; display: flex; align-items: center; gap: 0.6rem; opacity: 0; transition: opacity 0.2s; }
  .quiz-chrome-progress.visible { opacity: 1; }
  .back-btn { font-family: 'Archivo SemiExpanded', Helvetica, sans-serif; font-size: clamp(0.85rem, 2.5vw, 1rem); font-weight: 700; letter-spacing: 0.04em; padding: 0.55rem 1.25rem; border-radius: 999px; border: 1.5px solid #D4CFCE; background: #fff; color: #294878; cursor: pointer; transition: border-color 0.15s, background 0.15s, color 0.15s; white-space: nowrap; line-height: 1.4; }
  .back-btn:hover { border-color: #294878; background: #F0F4FA; }


  .loading-msg { padding: 3rem 2rem; text-align: center; font-family: 'Archivo SemiExpanded', Helvetica, sans-serif; font-size: 0.75rem; letter-spacing: 0.12em; text-transform: uppercase; color: #9F8B76; }
  .error-msg { padding: 3rem 2rem; text-align: center; color: #C8251A; font-size: 0.9rem; line-height: 1.6; }

  /* Question */
  .question-zone { background: #F9F5F2; padding: 4.5rem 6rem; min-height: 90px; display: flex; align-items: center; justify-content: center; }
  .question-zone > div { width: 100%; text-align: center; }
  .question-counter { font-family: 'Archivo SemiExpanded', Helvetica, sans-serif; font-size: 0.65rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: #9F8B76; margin-bottom: 0.6rem; }
  .question-text { font-family: 'Libre Caslon Text', Georgia, serif; font-size: 1.8rem; font-weight: 400; color: #0F1012; line-height: 1.55; }
  @media (max-width: 600px) {
    .question-zone { padding: 2rem 1.5rem; }
    .question-text { font-size: 1.4rem; }
    .postcard-decade { font-size: clamp(3.75rem, 15vw, 5rem); }
    .score-msg { font-size: 1.65rem; }
  }

  /* Answer rows */
  .answer-zone { padding: 1rem 1rem 0; background: #fff; }
  @media (min-width: 600px) { .answer-zone { padding: 1.25rem 2.5rem 0; } }
  .answer-list { display: flex; flex-direction: column; gap: 0.6rem; }
  .answer-row {
    display: flex; align-items: center; gap: 0.85rem;
    padding: 0.8rem 1rem; border: 1.5px solid #D4CFCE; border-radius: 6px;
    background: #fff; cursor: pointer; transition: border-color 0.15s, background 0.15s;
    user-select: none;
  }
  .answer-row:hover { border-color: #8D898A; background: #F9F5F2; }
  .answer-row.selected { border-color: #294878; background: #F0F4FA; }
  .answer-row.correct { border-color: #1DB87A; background: #EAFFF7; cursor: default; }
  .answer-row.incorrect { border-color: #C8251A; background: #FFF0EE; cursor: default; }
  .answer-row.revealed { cursor: default; }
  .answer-row.revealed:hover { border-color: #D4CFCE; background: #fff; }
  .answer-row.correct:hover { border-color: #1DB87A; background: #EAFFF7; }
  .answer-row.incorrect:hover { border-color: #C8251A; background: #FFF0EE; }

  .radio-circle {
    width: 20px; height: 20px; border-radius: 50%; border: 2px solid #D4CFCE;
    flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    transition: border-color 0.15s, background 0.15s; font-size: 0.65rem; font-weight: 700; color: #fff;
  }
  .answer-row.selected .radio-circle { border-color: #294878; background: #294878; }
  .answer-row.selected .radio-circle::after { content: ''; width: 8px; height: 8px; border-radius: 50%; background: #fff; display: block; }
  .answer-row.correct .radio-circle { border-color: #1DB87A; background: #1DB87A; }
  .answer-row.correct .radio-circle::after { content: '✓'; }
  .answer-row.incorrect .radio-circle { border-color: #C8251A; background: #C8251A; }
  .answer-row.incorrect .radio-circle::after { content: '✕'; }
  .answer-row-text { font-family: 'Inter', Helvetica, sans-serif; font-size: 0.9rem; font-weight: 500; color: #0F1012; line-height: 1.4; }
  .answer-img { width: 56px; height: 56px; object-fit: cover; border-radius: 4px; flex-shrink: 0; }

  /* Grid layout for image questions */
  .answer-list.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem; max-width: 640px; margin-left: auto; margin-right: auto; }
  .answer-list.grid .answer-row { flex-direction: column; align-items: flex-start; padding: 0; gap: 0; }
  .answer-list.grid .answer-img-wrap { width: 100%; aspect-ratio: 3/2; overflow: hidden; border-radius: 4px 4px 0 0; background: #F0EDE9; flex-shrink: 0; }
  .answer-list.grid .answer-img { width: 100%; height: 100%; object-fit: cover; object-position: center; display: block; border-radius: 0; }
  .answer-list.grid .answer-row-label { display: flex; align-items: center; gap: 0.6rem; padding: 0.65rem 0.75rem; width: 100%; }
  .answer-list.grid .answer-row-text { font-size: 0.82rem; }
  .answer-row.incorrect .answer-row-text { text-decoration: line-through; color: #8D898A; }



  /* Footer */
  .game-footer { padding: 0.85rem 1rem 1.25rem; background: #fff; }
  @media (min-width: 600px) { .game-footer { padding: 1rem 2.5rem 1.5rem; } }
  .progress-bar-wrap { flex: 1; height: 5px; background: #D4CFCE; border-radius: 3px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: #2E6DC1; border-radius: 3px; transition: width 0.4s ease; }
  .progress-label { font-size: 0.7rem; font-weight: 600; color: #9F8B76; white-space: nowrap; }
  .check-btn {
    width: 100%; padding: 0.9rem; border-radius: 6px; border: none;
    font-family: 'Archivo SemiExpanded', Helvetica, sans-serif;
    font-size: 0.9rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
    cursor: pointer; transition: background 0.2s;
  }
  .check-btn.inactive { background: #DCDCDC; color: #8D898A; cursor: default; }
  .check-btn.ready { background: #D42121; color: #fff; }
  .check-btn.next-q { background: #D42121; color: #fff; }

  /* Score screen */
  .score-screen { display: none; flex-direction: column; align-items: center; justify-content: center; padding: 1.5rem 1rem; min-height: 300px; position: relative; overflow: hidden; width: 100%; }
  .score-bg-video { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); pointer-events: none; border: none; z-index: 0; }
  .score-inner { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 560px; background: #fff; border: 1.5px solid #D4CFCE; border-radius: 8px; overflow: hidden; }
  .score-gif-wrap { width: 100%; padding: 0.75rem 0.75rem 0; }
  .score-gif { width: 100%; height: auto; object-fit: contain; border-radius: 6px; display: block; }
  .score-content { padding: 1rem 1.25rem 1.25rem; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; }
  .score-big { font-family: 'Libre Caslon Text', Georgia, serif; font-size: clamp(2.25rem, 10vw, 3.5rem); font-weight: 700; color: #D42121; line-height: 1; margin-bottom: 0.35rem; }
  .score-sub { font-family: 'Archivo SemiExpanded', Helvetica, sans-serif; font-size: clamp(0.6rem, 2vw, 0.75rem); font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: #9F8B76; margin-bottom: 0.75rem; }
  .score-msg { font-family: 'Libre Caslon Text', Georgia, serif; font-size: clamp(1.05rem, 3.5vw, 1.25rem); color: #0F1012; margin-bottom: 1rem; max-width: 340px; line-height: 1.55; }
  .restart-btn { padding: 0.75rem 1.5rem; border-radius: 6px; border: none; background: #D42121; color: #fff; font-family: 'Archivo SemiExpanded', Helvetica, sans-serif; font-size: clamp(0.7rem, 2.5vw, 0.85rem); font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer; margin-bottom: 0.85rem; width: 100%; max-width: 280px; }
  .restart-btn:hover { background: #b01b1b; }
  .gift-btn { display: block; padding: 0.75rem 1.5rem; border-radius: 6px; border: none; background: #294878; color: #fff; font-family: 'Archivo SemiExpanded', Helvetica, sans-serif; font-size: clamp(0.75rem, 2.5vw, 0.9rem); font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; margin-bottom: 0.85rem; width: 100%; max-width: 280px; text-align: center; text-decoration: none; }
  .gift-btn:hover { background: #1a3260; }
  @media (min-width: 500px) {
    .score-screen { padding: 1.5rem; }
    .score-gif-wrap { padding: 1rem 1rem 0; }
    .score-content { padding: 1.25rem 1.5rem 1.5rem; }
  }
  @media (min-width: 768px) {
    .score-screen { padding: 2.5rem; }
  }

  /* Postcard intro screen */
  .postcard-screen { display: none; position: relative; min-height: 480px; overflow: hidden; align-items: center; justify-content: center; border-radius: 8px; background: #F9F2E4; }
  @media (min-width: 600px) { .postcard-screen { min-height: 600px; } }
  .postcard-screen.visible { display: flex; }
  .postcard-bg { display: none; }
  .postcard-overlay { display: none; }
  @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.15); } }
  .postcard-icon { width: clamp(78px, 19.5vw, 156px); height: clamp(78px, 19.5vw, 156px); object-fit: contain; display: block; animation: pulse 1.4s ease-in-out infinite; }
  .postcard-content { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 3rem 2rem; text-align: center; gap: 1.25rem; }
  .postcard-decade { font-family: 'Archivo SemiExpanded', Helvetica, sans-serif; font-size: clamp(2.5rem, 10vw, 5rem); font-weight: 700; color: #0F1012; letter-spacing: 0.02em; line-height: 1; }
  .postcard-start-btn { padding: 0.85rem 2.5rem; border-radius: 6px; border: none; background: #D42121; color: #fff; font-family: 'Archivo SemiExpanded', Helvetica, sans-serif; font-size: 0.9rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; transition: background 0.2s; }
  .postcard-start-btn:hover { background: #b01b1b; }
</style>
</head>
<body>

<div class="trivia-embed">

<div class="trivia-game-card">
  <div id="loading-area" class="loading-msg">Loading questions…</div>

  <div class="decade-nav" id="decade-nav">
    <p class="decade-nav-heading">Choose a Decade</p>
    <div class="decade-pills" id="decade-pills"></div>
  </div>

  <div class="quiz-chrome" id="quiz-chrome">
    <button class="back-btn" id="back-btn">← Back</button>
    <div class="quiz-chrome-progress" id="quiz-chrome-progress">
      <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progress-bar" style="width:0%"></div></div>
      <span class="progress-label" id="progress-label"></span>
    </div>
  </div>

  <div class="postcard-screen" id="postcard-screen">
    <div class="postcard-bg" id="postcard-bg"></div>
    <div class="postcard-overlay"></div>
    <div class="postcard-content">
      <img class="postcard-icon" id="postcard-icon" src="" alt="" />
      <div class="postcard-decade" id="postcard-decade"></div>
      <button class="postcard-start-btn" id="postcard-start-btn">Start Quiz</button>
    </div>
  </div>

  <div id="game-area" style="display:none;">
    <div class="question-zone">
      <div>
        <p class="question-text" id="q-text"></p>
      </div>
    </div>
    <div class="answer-zone">
      <div class="answer-list" id="answer-list"></div>
    </div>

    <div class="game-footer">
      <button class="check-btn inactive" id="check-btn">Check</button>
    </div>
  </div>

  <div class="score-screen" id="score-screen">
    <iframe id="score-bg-video" class="score-bg-video" src="https://player.vimeo.com/video/1192275809?background=1&autoplay=1&loop=1&muted=1&byline=0&title=0" allow="autoplay; fullscreen"></iframe>
    <div class="score-inner">
      <div class="score-gif-wrap">
        <img id="score-gif" class="score-gif" src="https://media2.giphy.com/media/v1.Y2lkPTc5MGI3NjExMHp6eXp0bnNuczR6czJxd2oxbHozZXFrc2JsZjBrbXY4bG53cmE0eSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/fUQ4rhUZJYiQsas6WD/giphy.gif" alt="Celebration" />
      </div>
      <div class="score-content">
        <p class="score-big" id="score-big"></p>
        <p class="score-sub">Correct answers</p>
        <p class="score-msg" id="score-msg"></p>
        <button class="restart-btn" id="restart-btn">Try Another Decade</button>
        <a class="gift-btn" href="https://community.davidson.edu/gift-form" target="_blank" rel="noopener">Make a Gift</a>
      </div>
    </div>
  </div>
  </div><!-- /.trivia-game-card -->

</div><!-- /.trivia-embed -->

<script>
var QUIZ_URL = 'https://davidson.edu/decades';

function sizeVideoBg() {
  var screen = document.getElementById('score-screen');
  var vid = document.getElementById('score-bg-video');
  var w = screen.offsetWidth;
  var h = screen.offsetHeight;
  var iw = h * 16 / 9 > w ? Math.ceil(h * 16 / 9) : w;
  var ih = iw * 9 / 16 < h ? h : Math.ceil(iw * 9 / 16);
  vid.style.width = iw + 'px';
  vid.style.height = ih + 'px';
}

function setScoreBackground(isBlue) {
  var vid = document.getElementById('score-bg-video');
  var screen = document.getElementById('score-screen');
  var isMobile = window.innerWidth < 600;
  if (isBlue) {
    vid.style.display = 'none';
    screen.style.background = '#1300cc';
  } else if (isMobile) {
    vid.style.display = 'none';
    screen.style.background = '#D42121';
  } else {
    vid.style.display = 'block';
    screen.style.background = 'none';
  }
}

/* ── iframe height reporter ── */
function reportHeight() {
  var h = document.body.offsetHeight;
  window.parent.postMessage({ type: 'dav-quiz-height', height: h }, '*');
}
var _ro = new ResizeObserver(function() { reportHeight(); });
_ro.observe(document.body);
function afterRender() { setTimeout(reportHeight, 80); }

var SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSU9oMj75iSElaN3gsiYUoeALmitGhcEOFq4SvI-fsXDXirv9U6hyxSEAjsPc0FStrmoA5z7VLo1Qy6/pub?gid=0&single=true&output=csv";

var categories = [];        // [{ name, questions: [{q, choices, answer}] }]
var currentDecade = null;   // index into categories
var questions = [];         // active shuffled question list
var qIndex = 0, score = 0, selectedIndex = null, checked = false;

/* ── CSV helpers ── */
function parseCSV(text) {
  var lines = text.trim().split('\n');
  var headers = lines[0].split(',').map(function(h) { return h.trim().toLowerCase().replace(/"/g, ''); });
  return lines.slice(1).map(function(line) {
    var cols = [], cur = '', inQ = false;
    for (var i = 0; i < line.length; i++) {
      var ch = line[i];
      if (ch === '"') { inQ = !inQ; }
      else if (ch === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
      else { cur += ch; }
    }
    cols.push(cur.trim());
    var row = {};
    headers.forEach(function(h, i) { row[h] = (cols[i] || '').replace(/^"|"$/g, '').trim(); });
    return row;
  }).filter(function(r) { return r.decade && r.question; });
}

function buildCategories(rows) {
  var map = {}, coverMap = {}, order = [];
  rows.forEach(function(row) {
    var d = row.decade.trim();
    if (!map[d]) { map[d] = []; order.push(d); }
    if (!coverMap[d] && row.cover_image) { coverMap[d] = row.cover_image; }
    var ai = ['A','B','C','D'].indexOf((row.correct || 'A').trim().toUpperCase());
    map[d].push({
      q: row.question,
      choices: [row.choice_a, row.choice_b, row.choice_c, row.choice_d],
      images: [row.image_a || '', row.image_b || '', row.image_c || '', row.image_d || ''],
      answer: ai >= 0 ? ai : 0
    });
  });
  return order.map(function(d) { return { name: d, coverImage: coverMap[d] || '', questions: map[d] }; });
}

/* ── Sheet loader ── */
function loadSheet() {
  fetch(SHEET_CSV_URL + '&t=' + Date.now())
    .then(function(r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.text(); })
    .then(function(text) {
      var rows = parseCSV(text);
      if (!rows.length) throw new Error('No data rows found.');
      categories = buildCategories(rows);
      document.getElementById('loading-area').style.display = 'none';
      buildNav();
      initNavListeners();
      showDecadeNav();
    })
    .catch(function(e) {
      document.getElementById('loading-area').className = 'error-msg';
      document.getElementById('loading-area').innerHTML = 'Could not load questions.<br><small>' + e.message + '</small>';
    });
}

/* ── Shuffle ── */
function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}

/* ── Nav ── */
function showDecadeNav() {
  currentDecade = null;
  document.getElementById('decade-nav').classList.add('visible');
  document.getElementById('quiz-chrome').classList.remove('visible');
  document.getElementById('postcard-screen').classList.remove('visible');
  document.getElementById('game-area').style.display = 'none';
  document.getElementById('score-screen').classList.remove('visible');
  afterRender();
}

function buildNav() {
  var pillsEl = document.getElementById('decade-pills');
  pillsEl.innerHTML = '';
  categories.forEach(function(cat, i) {
    var pill = document.createElement('button');
    pill.className = 'decade-pill';
    pill.textContent = cat.name;
    pill.addEventListener('click', function() { selectDecade(i); });
    pillsEl.appendChild(pill);
  });
}

function initNavListeners() {
  document.getElementById('back-btn').addEventListener('click', showDecadeNav);
}

function selectDecade(i) {
  currentDecade = i;
  questions = categories[i].questions.slice();
  qIndex = 0; score = 0;
  var cat = categories[i];
document.getElementById('decade-nav').classList.remove('visible');
  document.getElementById('quiz-chrome').classList.add('visible');
  document.getElementById('quiz-chrome-progress').classList.remove('visible');
  document.getElementById('progress-bar').style.width = '0%';
  document.getElementById('game-area').style.display = 'none';
  document.getElementById('score-screen').classList.remove('visible');
  document.getElementById('postcard-decade').textContent = cat.name;
  var icon = document.getElementById('postcard-icon');
  icon.src = cat.coverImage || '';
  icon.style.display = cat.coverImage ? 'block' : 'none';
  document.getElementById('postcard-screen').classList.add('visible');
  document.getElementById('postcard-start-btn').onclick = startQuiz;
  afterRender();
}

function startQuiz() {
  document.getElementById('postcard-screen').classList.remove('visible');
  document.getElementById('game-area').style.display = 'block';
  document.getElementById('quiz-chrome-progress').classList.add('visible');
  loadQuestion();
  afterRender();
}

/* ── Question flow ── */
function loadQuestion() {
  selectedIndex = null; checked = false;
  var q = questions[qIndex];
  var total = questions.length;
  document.getElementById('q-text').textContent = q.q;
  document.getElementById('progress-label').textContent = 'Question ' + (qIndex + 1) + ' / ' + total;
  document.getElementById('progress-bar').style.width = (qIndex / total * 100) + '%';

  var list = document.getElementById('answer-list');
  list.innerHTML = '';
  var hasImages = q.images.some(function(url) { return url; });
  list.className = 'answer-list' + (hasImages ? ' grid' : '');
  q.choices.forEach(function(a, i) {
    var row = document.createElement('div');
    row.className = 'answer-row';
    if (hasImages) {
      var imgHtml = '<div class="answer-img-wrap">' + (q.images[i] ? '<img class="answer-img" src="' + q.images[i] + '" alt="">' : '') + '</div>';
      row.innerHTML = imgHtml + '<div class="answer-row-label"><div class="radio-circle"></div><span class="answer-row-text">' + a + '</span></div>';
    } else {
      row.innerHTML = '<div class="radio-circle"></div><span class="answer-row-text">' + a + '</span>';
    }
    row.addEventListener('click', function() { selectAnswer(i); });
    list.appendChild(row);
  });

  var btn = document.getElementById('check-btn');
  btn.className = 'check-btn inactive';
  btn.textContent = 'Check';
  btn.onclick = null;
  afterRender();
}

function selectAnswer(i) {
  if (checked) return;
  selectedIndex = i;
  document.querySelectorAll('.answer-row').forEach(function(r, idx) {
    r.className = 'answer-row' + (idx === i ? ' selected' : '');
  });
  var btn = document.getElementById('check-btn');
  btn.className = 'check-btn ready';
  btn.onclick = checkAnswer;
}

function checkAnswer() {
  if (checked || selectedIndex === null) return;
  checked = true;
  var q = questions[qIndex];
  var isCorrect = selectedIndex === q.answer;
  if (isCorrect) score++;

  document.querySelectorAll('.answer-row').forEach(function(r, i) {
    if (i === q.answer) r.className = 'answer-row correct';
    else if (i === selectedIndex) r.className = 'answer-row incorrect';
    else r.className = 'answer-row revealed';
  });

  var btn = document.getElementById('check-btn');
  btn.className = 'check-btn next-q';
  btn.textContent = qIndex + 1 < questions.length ? 'Next →' : 'See Results';
  btn.onclick = nextQuestion;
  document.getElementById('progress-bar').style.width = ((qIndex + 1) / questions.length * 100) + '%';
  afterRender();
}

function nextQuestion() {
  qIndex++;
  if (qIndex < questions.length) {
    loadQuestion();
  } else {
    document.getElementById('game-area').style.display = 'none';
    document.getElementById('quiz-chrome-progress').classList.remove('visible');
    var total = questions.length;
    var pct = score / total;
    document.getElementById('score-big').textContent = score + '/' + total;
    document.getElementById('score-msg').textContent =
      pct === 1 ? 'Perfect score — you really know your Davidson history! 🌟' :
      score === total - 1 ? 'So close, Wildcat. Don\'t close the books just yet. You got this! 💪' :
      pct >= 0.4 ? 'Not bad — a few more visits to the archives might help. 📚' :
      'You\'re a little rusty, Wildcat! 😿';
    document.getElementById('score-gif').src = pct === 1
      ? 'https://media1.giphy.com/media/v1.Y2lkPTc5MGI3NjExNWhuZGt1cmpxaXU2YnJwaDA3bHcweGJnMnZhODY4dnNkcDJiZWt2YyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/i4MSkeVYgXcZUwZqBJ/giphy.gif'
      : score === total - 1
      ? 'https://media0.giphy.com/media/v1.Y2lkPTc5MGI3NjExenQ5YnNqMmthbHd6MzY5dHIzb2FuZWR4enE3ZTJ6OXF3djJpNGgzciZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/PfXVImqYhhxwoLlD88/giphy.gif'
      : pct >= 0.4
      ? 'https://media4.giphy.com/media/v1.Y2lkPTc5MGI3NjExcjE1M2EwbWFtMWRyeGNya2YxaXp3Z3l5c3c1c2hqaTMyZTV2MndqMSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/ujjlRiJZPlIzQeR8Jk/giphy.gif'
      : 'https://media4.giphy.com/media/v1.Y2lkPTc5MGI3NjExcWd2NXdna2ljdnlpNnl4MnVvZHU5dWZiMGdlejVzdWxhM204bmNpZiZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/flADEjrqxDri1QQ2Sp/giphy.gif';
    setScoreBackground(pct !== 1);
    document.getElementById('score-screen').classList.add('visible');
    requestAnimationFrame(function() { requestAnimationFrame(sizeVideoBg); });
    document.getElementById('restart-btn').onclick = showDecadeNav;
    afterRender();
  }
}

loadSheet();
</script>
</body>
</html>
