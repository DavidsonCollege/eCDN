<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FNYE Winners Circle</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Archivo:wght@300;700;800&display=swap" rel="stylesheet">
  <style>
    /* ─────────────────────────────────────────────────────────────────────
       BRAND FONTS — activate ONLY when hosted on a davidson.edu domain.
       See FNYE-countdown.html for instructions.
    ───────────────────────────────────────────────────────────────────── */

    :root {
      --davidson-red: #D42121;
      --davidson-black: #0F1012;
      --night:    #1B2A4A;
      --gold:     #E3B968;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: transparent;
      color: var(--davidson-black);
      font-family: 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif;
    }

    .band--alt {
      background: url('https://www.davidson.edu/sites/default/files/2026-06/reunion_0053-edited.png') center/cover no-repeat;
      padding: clamp(4rem, 8vw, 7rem) clamp(2rem, 5vw, 4rem);
      width: 100%;
    }

    .band-float {
      background: #fff;
      width: min(88%, 640px);
      margin: 0 auto;
      padding: clamp(2rem, 4vw, 3rem) clamp(2rem, 4vw, 3rem);
      box-shadow: 0 8px 48px rgba(0,0,0,0.22);
    }

    .band-heading {
      font-family: signifier, Georgia, serif;
      font-size: 2.25rem;
      font-weight: 400;
      line-height: 1.3;
      color: var(--davidson-black);
      text-align: center;
      margin: 0 0 0.75rem;
    }

    .band-intro {
      font-family: 'Nimbus Sans Extended', 'Inter', Helvetica, sans-serif;
      font-size: clamp(0.9rem, 1.6vw, 1.05rem);
      color: var(--davidson-black);
      line-height: 1.6;
      margin-bottom: clamp(0.75rem, 1.5vw, 1rem);
      text-align: center;
    }

    .boards {
      display: flex;
      gap: clamp(1rem, 2.5vw, 2rem);
      justify-content: center;
      align-items: flex-start;
      width: 100%;
      margin: 0;
    }

    .board {
      flex: 1 1 0;
      min-width: 0;
    }

    .board-body {
      border: none;
      background: transparent;
      overflow: visible;
    }

    .board-rows {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      min-height: 0;
    }

    .board-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      border: 1px solid rgba(15,16,18,0.15);
      background: #fff;
      padding: 0.9rem 1.25rem;
    }

    .board-rank {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 1.4rem;
      height: 1.4rem;
      min-width: 1.4rem;
      background: #15803D;
      color: #fff;
      font-size: 0.85rem;
      border-radius: 3px;
    }

    .board-label {
      font-family: 'Nimbus Sans Extended', 'Archivo', Helvetica, sans-serif;
      font-size: clamp(1rem, 2vw, 1.2rem);
      font-weight: 700;
      letter-spacing: 0.02em;
      color: var(--davidson-black);
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .board-value {
      font-family: 'Nimbus Sans Extended', 'Archivo', sans-serif;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      font-size: clamp(1.1rem, 2.3vw, 1.4rem);
      color: #15803D;
    }

    .board-value-group {
      display: flex;
      align-items: center;
      gap: 0.3em;
      flex-shrink: 0;
    }

    .board-unit {
      font-family: 'Archivo', 'Helvetica Neue', sans-serif;
      font-size: 0.58rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #15803D;
      opacity: 0.7;
    }

    .board-empty {
      font-family: 'Inter', Helvetica, sans-serif;
      font-size: 0.9rem;
      font-style: italic;
      color: rgba(15, 16, 18, 0.5);
      text-align: center;
      padding: 1rem 0.5rem;
    }

    .board-updated {
      font-family: 'Inter', Helvetica, sans-serif;
      font-size: 0.75rem;
      color: rgba(15, 16, 18, 0.45);
      text-align: center;
      margin-top: 1rem;
    }
    .board-updated:empty { display: none; }

    .celebrate-btn {
      display: block;
      margin: 0.75rem auto 0;
      background: var(--davidson-red);
      color: #fff;
      font-family: 'Archivo', 'Helvetica Neue', sans-serif;
      font-size: clamp(0.58rem, 1.15vw, 0.72rem);
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 1rem 2.5rem;
      border: none;
      cursor: pointer;
    }
    .celebrate-btn:hover { background: #B81C1C; }
    .celebrate-btn:active { transform: scale(0.97); }
  </style>
</head>
<body>

  <div class="band--alt">
    <div class="band-float">
      <h2 class="band-heading" id="board-title">Winner's Circle</h2>
      <p class="band-intro">These classes have reached their goal of 50% participation.</p>
      <div class="boards">
        <section class="board">
          <div class="board-body">
            <ol class="board-rows" id="board-rows"></ol>
          </div>
        </section>
      </div>
      <p class="board-updated" id="board-updated"></p>
      <button class="celebrate-btn" id="celebrate-btn">🎉 Celebrate!</button>
    </div>
  </div>

  <script>
    var SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQLhjgD_uP8XuiBcfs2X9_ycHa7E-_BXNH2QiR777Z2Zgo175oz_dHwiYYVSyXbArlAKqL_lrUslr0T/pub?output=csv&single=true&gid=44559502';

    function num(cell) {
      var str = String(cell == null ? '' : cell).replace(/^"|"$/g, '').trim();
      if (!str) return NaN;
      var hasPct = str.indexOf('%') !== -1;
      var v = parseFloat(str.replace(/[%,$\s]/g, ''));
      if (isNaN(v)) return NaN;
      if (!hasPct && v <= 1) v = v * 100;
      return v;
    }

    function parseGrid(text) {
      return text.split(/\r?\n/).filter(function (l) { return l.trim(); })
        .map(function (line) {
          var result = [];
          var re = /("(?:[^"]|"")*"|[^,]*)(,|$)/g;
          var m;
          while ((m = re.exec(line)) !== null) {
            result.push(m[1].replace(/^"|"$/g, '').replace(/""/g, '"').trim());
            if (m[2] === '') break;
          }
          return result;
        });
    }

    function renderBoard(rows) {
      var ol = document.getElementById('board-rows');
      ol.innerHTML = '';
      if (!rows.length) {
        var empty = document.createElement('li');
        empty.className = 'board-empty';
        empty.textContent = 'No classes have reached 50% yet — be the first!';
        ol.appendChild(empty);
        postHeight();
        return;
      }
      rows.forEach(function (row) {
        var li = document.createElement('li');
        li.className = 'board-row';

        var rankEl = document.createElement('span');
        rankEl.className = 'board-rank';
        rankEl.textContent = '✓';

        var labelEl = document.createElement('span');
        labelEl.className = 'board-label';
        labelEl.textContent = /^\d{4}$/.test(row[0]) ? 'Class of ' + row[0] : row[0];

        var valueGroup = document.createElement('span');
        valueGroup.className = 'board-value-group';

        var valueEl = document.createElement('span');
        valueEl.className = 'board-value';
        valueEl.textContent = row[1] + '%';
        valueGroup.appendChild(valueEl);

        var unitEl = document.createElement('span');
        unitEl.className = 'board-unit';
        unitEl.textContent = 'participation';
        valueGroup.appendChild(unitEl);

        li.appendChild(rankEl);
        li.appendChild(labelEl);
        li.appendChild(valueGroup);
        ol.appendChild(li);
      });
      postHeight();
    }

    fetch(SHEET_URL + '&t=' + Date.now())
      .then(function (r) { return r.text(); })
      .then(function (text) {
        var grid = parseGrid(text);
        var rows = [];
        grid.forEach(function (cells, rowIdx) {
          if (rowIdx === 0) return;
          var label = cells[0];
          var v = num(cells[3]);
          if (label && !isNaN(v) && v >= 50) rows.push([label, Math.round(v)]);
        });
        rows.sort(function (a, b) { return b[1] - a[1]; });
        renderBoard(rows);
      })
      .catch(function () { renderBoard([]); });

    // ── Confetti burst ───────────────────────────────────────────────────────
    (function () {
      var btn = document.getElementById('celebrate-btn');
      if (!btn) return;
      var COLORS = ['#D42121','#E3B968','#FFFFFF','#F3C969','#FF4444','#FFE9A8','#B81C1C'];

      btn.addEventListener('click', function () {
        if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
        var canvas = document.createElement('canvas');
        canvas.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;';
        document.body.appendChild(canvas);
        var ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        var particles = [];
        for (var i = 0; i < 140; i++) {
          particles.push({
            x: Math.random() * canvas.width,
            y: -10 - Math.random() * 40,
            vx: (Math.random() - 0.5) * 5,
            vy: 1.2 + Math.random() * 2.5,
            color: COLORS[Math.floor(Math.random() * COLORS.length)],
            w: 7 + Math.random() * 8,
            h: 4 + Math.random() * 4,
            rot: Math.random() * Math.PI * 2,
            rotV: (Math.random() - 0.5) * 0.18,
            life: 0,
            ttl: 220 + Math.random() * 100
          });
        }

        function frame() {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          var any = false;
          for (var i = 0; i < particles.length; i++) {
            var p = particles[i];
            p.life++;
            if (p.life >= p.ttl) continue;
            any = true;
            p.x += p.vx; p.y += p.vy; p.vy += 0.055; p.rot += p.rotV;
            var fade = 1 - Math.max(0, (p.life - p.ttl * 0.65) / (p.ttl * 0.35));
            ctx.globalAlpha = fade;
            ctx.save();
            ctx.translate(p.x, p.y);
            ctx.rotate(p.rot);
            ctx.fillStyle = p.color;
            ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
            ctx.restore();
          }
          ctx.globalAlpha = 1;
          if (any) requestAnimationFrame(frame);
          else document.body.removeChild(canvas);
        }
        requestAnimationFrame(frame);
      });
    })();

    // ── Report height to parent page for iframe auto-resize ──────────────────
    var lastHeight = 0;
    function postHeight() {
      var b = document.querySelector('.band--alt');
      var h = Math.ceil(b.getBoundingClientRect().bottom +
              (parseFloat(getComputedStyle(b).marginBottom) || 0));
      if (h !== lastHeight && h > 0) {
        lastHeight = h;
        window.parent.postMessage({ type: 'fnye-band-height', height: h }, '*');
      }
    }

    window.addEventListener('load', postHeight);
    window.addEventListener('resize', postHeight);
    if (document.fonts && document.fonts.ready) {
      document.fonts.ready.then(postHeight);
    }
    if (typeof ResizeObserver !== 'undefined') {
      new ResizeObserver(postHeight).observe(document.body);
    }

    var bgImg = new Image();
    bgImg.src = 'https://www.davidson.edu/sites/default/files/2026-06/reunion_0053-edited.png';
    bgImg.onload = postHeight;
  </script>
</body>
</html>
