<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Countdown to July 1, 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Caslon+Text:wght@400;700&family=Inter:wght@400;500;600;700&family=Archivo:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --davidson-red: #D42121;
      --davidson-black: #0F1012;
      --davidson-white: #FFFFFF;
      --davidson-sandstone: #E9DED3;
      --davidson-gray-1: #F9F5F2;
      --davidson-gray-3: #D4CFCE;
      --davidson-gray-10: #6A6869;
      --davidson-gray-dark: #4A484A;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--davidson-gray-1);
      color: var(--davidson-black);
      font-family: 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .content {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 2rem;
      max-width: 1000px;
      width: 100%;
    }

    .countdown {
      display: flex;
      gap: clamp(0.75rem, 2.5vw, 1.5rem);
      align-items: stretch;
      justify-content: center;
      flex-wrap: wrap;
    }

    .unit {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.85rem;
      background: var(--davidson-white);
      border: 1px solid var(--davidson-gray-3);
      border-top: 4px solid var(--davidson-red);
      padding: clamp(1.25rem, 3vw, 2rem) clamp(1rem, 3vw, 2rem);
      min-width: clamp(120px, 20vw, 170px);
    }

    .number {
      font-family: 'Archivo', 'Helvetica Neue', sans-serif;
      font-size: clamp(2.75rem, 9vw, 5rem);
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      line-height: 1;
      color: var(--davidson-black);
      min-width: 2ch;
      text-align: center;
      transition: transform 0.1s ease;
    }

    .number.tick {
      transform: scale(1.04);
    }

    .label {
      font-size: clamp(0.65rem, 1.5vw, 0.8rem);
      font-weight: 600;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--davidson-gray-10);
    }

    .message {
      font-family: 'Libre Caslon Text', Georgia, serif;
      font-size: clamp(1.5rem, 4vw, 2.25rem);
      color: var(--davidson-red);
      display: none;
    }

    @media (max-width: 480px) {
      .countdown {
        display: grid;
        grid-template-columns: 1fr 1fr;
      }
      .unit {
        min-width: 0;
      }
    }
  </style>
</head>
<body>

  <div class="content">
    <div class="countdown" id="countdown">
      <div class="unit">
        <span class="number" id="days">--</span>
        <span class="label">Days</span>
      </div>
      <div class="unit">
        <span class="number" id="hours">--</span>
        <span class="label">Hours</span>
      </div>
      <div class="unit">
        <span class="number" id="minutes">--</span>
        <span class="label">Minutes</span>
      </div>
      <div class="unit">
        <span class="number" id="seconds">--</span>
        <span class="label">Seconds</span>
      </div>
    </div>

    <p class="message" id="message">The day has arrived.</p>
  </div>

  <script>
    const TARGET = new Date('2026-07-01T00:00:00');

    const elDays    = document.getElementById('days');
    const elHours   = document.getElementById('hours');
    const elMinutes = document.getElementById('minutes');
    const elSeconds = document.getElementById('seconds');
    const elMessage = document.getElementById('message');
    const elCountdown = document.getElementById('countdown');

    function pad(n) { return String(n).padStart(2, '0'); }

    function tick(el, val) {
      if (el.textContent !== val) {
        el.classList.remove('tick');
        void el.offsetWidth; // reflow
        el.classList.add('tick');
        el.textContent = val;
      }
    }

    function update() {
      const now  = new Date();
      const diff = TARGET - now;

      if (diff <= 0) {
        elCountdown.style.display = 'none';
        elMessage.style.display   = 'block';
        return;
      }

      const totalSec = Math.floor(diff / 1000);
      const secs  = totalSec % 60;
      const mins  = Math.floor(totalSec / 60) % 60;
      const hrs   = Math.floor(totalSec / 3600) % 24;
      const days  = Math.floor(totalSec / 86400);

      tick(elDays,    pad(days));
      tick(elHours,   pad(hrs));
      tick(elMinutes, pad(mins));
      tick(elSeconds, pad(secs));
    }

    update();
    setInterval(update, 1000);
  </script>
</body>
</html>
