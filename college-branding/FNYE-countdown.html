<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Doug Hicks' Fiscal New Year's Eve Countdown</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Inter:wght@400;500;600;700&family=Archivo:wght@300;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --davidson-red: #D42121;
      --davidson-black: #0F1012;
      --night:    #1B2A4A;
      --gold:     #E3B968;
      --gray-10:  #6A6869;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: transparent;
      color: var(--davidson-black);
      font-family: 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif;
    }

    .content {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 0.5rem;
      width: 100%;
    }

    .heading {
      /* Matches davidson.edu's sitewide H1: signifier, 2.25rem, 400, 1.3.
         Signifier is a licensed font the site loads; inside this iframe it
         isn't available, so Georgia (its own declared fallback) renders. */
      font-family: signifier, Georgia, serif;
      font-size: 2.25rem;
      font-weight: 400;
      line-height: 1.3;
      color: var(--davidson-black);
      margin-bottom: clamp(1.25rem, 3.5vw, 2.5rem);
    }

    .countdown {
      display: flex;
      gap: clamp(1rem, 3vw, 2.25rem);
      align-items: baseline;
      justify-content: center;
      flex-wrap: wrap;
      width: 100%;
    }

    .sep {
      font-family: 'Archivo', 'Helvetica Neue', sans-serif;
      font-size: clamp(2.4rem, 9vw, 5.4rem);
      font-weight: 300;
      line-height: 1;
      color: var(--davidson-red);
      align-self: center;
      transform: translateY(-0.35em); /* optically center on the digits, above the labels */
    }

    .unit {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(0.6rem, 1.5vw, 1rem);
    }

    .number {
      font-family: 'Archivo', 'Helvetica Neue', sans-serif;
      font-size: clamp(4rem, 15vw, 9rem);
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      line-height: 1;
      min-width: 2ch;
      text-align: center;
      transition: transform 0.1s ease;
      /* Marquee-letter look, minus the bulbs:
         red face, gold edge, dark dimensional drop */
      color: var(--davidson-red); /* solid brand red — no outline, no shadow */
    }

    .number.tick { transform: scale(1.04); }

    .label {
      font-size: clamp(0.85rem, 2.2vw, 1.15rem);
      font-weight: 700;
      letter-spacing: 0.3em;
      text-indent: 0.3em; /* visually centers letterspaced caps */
      text-transform: uppercase;
      color: var(--night);
    }

    .art {
      display: block;
      height: auto;
    }

    .band {
      position: relative;
      width: min(92%, 1100px);  /* inset box with white margins, not full-bleed */
      margin: clamp(2.5rem, 6vw, 4.5rem) auto clamp(1.5rem, 4vw, 3rem);
      background:
        radial-gradient(ellipse at 80% 0%, rgba(227, 185, 104, 0.08), transparent 55%),
        linear-gradient(160deg, #16223D 0%, #0C1526 100%);
      padding: clamp(3.5rem, 8vw, 6rem) 1rem clamp(4rem, 9vw, 6.5rem);
      box-shadow: 0 8px 30px rgba(15, 16, 18, 0.18);
    }

    .band-heading {
      /* Same sitewide H1 spec, in white on the night sky */
      font-family: signifier, Georgia, serif;
      font-size: 2.25rem;
      font-weight: 400;
      line-height: 1.3;
      color: #FFFFFF;
      text-align: center;
      margin: clamp(1.5rem, 4vw, 2.5rem) auto 0;
      max-width: 90%;
    }

    .boards {
      display: flex;
      gap: clamp(1.25rem, 3vw, 2.5rem);
      justify-content: center;
      align-items: flex-start;
      width: min(92%, 880px);
      margin: clamp(1.5rem, 4vw, 2.5rem) auto 0;
    }

    .board {
      flex: 1 1 0;
      min-width: 0;
    }

    .board-title {
      font-family: 'Archivo', 'Helvetica Neue', sans-serif;
      font-size: clamp(0.8rem, 1.6vw, 0.95rem);
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      text-align: center;
      color: #9FE9FF;
      margin-bottom: 0.9rem;
    }

    .board-rows {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
    }

    .board-row {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.10);
      padding: 0.5rem 0.75rem;
    }

    .board-row.first {
      background: rgba(227, 185, 104, 0.16);
      border-color: rgba(227, 185, 104, 0.45);
    }

    .board-rank {
      font-family: 'Archivo', sans-serif;
      font-weight: 800;
      font-size: 0.9rem;
      color: #E3B968;
      min-width: 1.4em;
      text-align: center;
    }

    .board-label {
      font-family: 'Inter', Helvetica, sans-serif;
      font-size: clamp(0.85rem, 1.8vw, 1rem);
      font-weight: 500;
      color: #FFFFFF;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .board-value {
      font-family: 'Archivo', sans-serif;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      font-size: clamp(0.95rem, 2vw, 1.15rem);
      color: #FFE9A8;
    }

    .board-value.plus { color: #4ADE80; }   /* green daily-donor counts */

    .board-rank.check { color: #4ADE80; font-size: 1rem; }

    /* "Done" theme: every row reads as completed — green tint, no ranking gold */
    .board--done .board-row,
    .board--done .board-row.first {
      background: rgba(74, 222, 128, 0.12);
      border-color: rgba(74, 222, 128, 0.38);
    }
    .board--done .board-value { color: #4ADE80; }
    .board--done .board-title { color: #4ADE80; }

    .board-empty {
      font-family: 'Inter', Helvetica, sans-serif;
      font-size: 0.9rem;
      font-style: italic;
      color: rgba(255, 255, 255, 0.65);
      text-align: center;
      padding: 1rem 0.5rem;
    }

    .board-updated {
      font-family: 'Inter', Helvetica, sans-serif;
      font-size: 0.75rem;
      color: rgba(255, 255, 255, 0.55);
      text-align: center;
      margin-top: 1rem;
    }

    @media (max-width: 640px) {
      .boards { flex-direction: column; align-items: stretch; }
    }

    .art-lockup {
      width: clamp(340px, 90%, 1060px);
      margin: 0 auto;
      position: relative;
      mix-blend-mode: screen; /* PNG has a baked black bg; screen makes black invisible on the dark band */
    }

    /* Animated fireworks bridging the seam: the canvas straddles the
       band's top edge — half over the white zone, half over the dark */
    .fireworks {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 560px;            /* reaches the clock zone, but stays below the heading */
      transform: translateY(-55%); /* ~55% above the seam, 45% in the band */
      pointer-events: none;
    }

    .message {
      font-family: 'Great Vibes', Georgia, cursive;
      font-size: clamp(2.5rem, 7vw, 4rem);
      color: var(--davidson-red);
      display: none;
    }

    /* Mobile: 2×2 grid of the four units, tightened up */
    @media (max-width: 640px) {
      .countdown {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem 0.5rem;
        justify-items: center;
      }
      .unit { min-width: 0; gap: 0.35rem; }
      .sep { display: none; }
      .heading { margin-bottom: 1rem; }
      .content { padding-top: 0.25rem; }
      .band { margin-top: 1.75rem; }
    }

    @media (prefers-reduced-motion: reduce) {
      .number { transition: none; }
    }
  </style>
</head>
<body>

  <div class="content">

    <h2 class="heading" id="heading">Join us in the countdown to</h2>

    <div class="countdown" id="countdown">
      <div class="unit">
        <span class="number" id="days">--</span>
        <span class="label">Days</span>
      </div>
      <span class="sep" aria-hidden="true">:</span>
      <div class="unit">
        <span class="number" id="hours">--</span>
        <span class="label">Hours</span>
      </div>
      <span class="sep" aria-hidden="true">:</span>
      <div class="unit">
        <span class="number" id="minutes">--</span>
        <span class="label">Minutes</span>
      </div>
      <span class="sep" aria-hidden="true">:</span>
      <div class="unit">
        <span class="number" id="seconds">--</span>
        <span class="label">Seconds</span>
      </div>
    </div>

    <p class="message" id="message">Happy Fiscal New Year!</p>
  </div>

  <!-- ── Dark band: the neon lockup's home ─────────────────────────────
       The band is CSS (full-width, resolution-independent); only the
       lockup and fireworks are images. Export both as transparent PNG @2x.
       The fireworks straddle the white/dark seam to bridge the two zones. -->
  <div class="band">
    <canvas class="fireworks" id="fireworks" aria-hidden="true"></canvas>
    <img class="art art-lockup" src="NYFE-Lockup.png" alt="The Fiscal New Year" onerror="this.style.display='none'">
    <h2 class="band-heading">Which classes are in the lead?</h2>
    <div class="boards">
      <section class="board">
        <h3 class="board-title" id="board-title-0">Leaderboard 1</h3>
        <ol class="board-rows" id="board-rows-0"></ol>
      </section>
      <section class="board">
        <h3 class="board-title" id="board-title-1">Leaderboard 2</h3>
        <ol class="board-rows" id="board-rows-1"></ol>
      </section>
    </div>
    <p class="board-updated" id="board-updated"></p>
  </div>

  <script>
    const TARGET = new Date('2026-07-01T00:00:00');

    const elDays    = document.getElementById('days');
    const elHours   = document.getElementById('hours');
    const elMinutes = document.getElementById('minutes');
    const elSeconds = document.getElementById('seconds');
    const elMessage = document.getElementById('message');
    const elCountdown = document.getElementById('countdown');

    function pad(n) { return String(n).padStart(2, '0'); }

    function tick(el, val) {
      if (el.textContent !== val) {
        el.classList.remove('tick');
        void el.offsetWidth; // reflow
        el.classList.add('tick');
        el.textContent = val;
      }
    }

    function update() {
      const now  = new Date();
      const diff = TARGET - now;

      if (diff <= 0) {
        elCountdown.style.display = 'none';
        document.getElementById('heading').style.display = 'none';
        elMessage.style.display   = 'block';
        return;
      }

      const totalSec = Math.floor(diff / 1000);
      const secs  = totalSec % 60;
      const mins  = Math.floor(totalSec / 60) % 60;
      const hrs   = Math.floor(totalSec / 3600) % 24;
      const days  = Math.floor(totalSec / 86400);

      tick(elDays,    pad(days));
      tick(elHours,   pad(hrs));
      tick(elMinutes, pad(mins));
      tick(elSeconds, pad(secs));
    }

    update();
    setInterval(update, 1000);

    // ── Leaderboards fed by a published Google Sheet ──────────────────────────
    // Setup (one time, in Google Sheets):
    //   1. Make a sheet with two tabs, one per leaderboard.
    //      Each tab: column A = name (e.g. "Class of 2026"), column B = number.
    //      Cell A1/B1 may be headers ("Class", "Points") — they're skipped.
    //   2. File → Share → Publish to web → choose the TAB → "Comma-separated
    //      values (.csv)" → Publish → copy the link.
    //   3. Paste each tab's link below, and set the titles.
    // Edits to the sheet appear here automatically (Google caches ~5 min).
    // Sheet layout (NYFE Spreadsheet):
    //   Tab "Daily Donors": A = decade/class, B..F = Day 1..Day 5 donor counts.
    //     The board shows the MOST RECENT day that has any numbers in it.
    //   Tab "Goal Reached": A = decade/class, D = % participation.
    //     The board shows only rows at or above 50%.
    var SHEET = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQLhjgD_uP8XuiBcfs2X9_ycHa7E-_BXNH2QiR777Z2Zgo175oz_dHwiYYVSyXbArlAKqL_lrUslr0T/pub?output=csv&single=true';
    var BOARDS = [
      { title: 'Daily Donors',
        url: SHEET + '&gid=0',
        format: 'plus',          // values render as green "+N"
        rank: 'number',
        limit: 10,               // show the top 10 classes
        mode: 'latest-day' },
      { title: 'Goal Reached',
        url: SHEET + '&gid=44559502',
        format: 'percent',       // values render as "N%"
        rank: 'check',           // green check instead of a rank number
        theme: 'done',           // green rows: these classes are finished
        mode: 'goal-50' }
    ];

    function num(cell) {
      var str = String(cell == null ? '' : cell).replace(/^"|"$/g, '').trim();
      if (!str) return NaN;
      var hasPct = str.indexOf('%') !== -1;
      var v = parseFloat(str.replace(/[%,$\s]/g, ''));
      if (isNaN(v)) return NaN;
      // Sheets may publish percents as "52%", "52", or a 0.52 fraction
      if (!hasPct && v > 0 && v <= 1) v = v * 100;
      return hasPct || true ? v : v;
    }

    function parseGrid(text) {
      return text.split(/\r?\n/).filter(function (l) { return l.trim(); })
        .map(function (line) {
          return (line.match(/("([^"]|"")*"|[^,]*)(?=,|$)/g) || [])
            .map(function (c) { return c.replace(/^"|"$/g, '').replace(/""/g, '"').trim(); });
        });
    }

    function extractRows(grid, board) {
      var rows = [];
      if (board.mode === 'latest-day') {
        // find the rightmost day column that has any numeric data
        var lastCol = -1;
        grid.forEach(function (cells) {
          for (var c = cells.length - 1; c >= 1; c--) {
            if (!isNaN(parseFloat(String(cells[c]).replace(/[%,$\s]/g, '')))) {
              if (c > lastCol) lastCol = c;
              break;
            }
          }
        });
        if (lastCol < 1) return rows;
        grid.forEach(function (cells) {
          var label = cells[0];
          var v = parseFloat(String(cells[lastCol] || '').replace(/[,$\s]/g, ''));
          if (label && !isNaN(v)) rows.push([label, v]);
        });
      } else if (board.mode === 'goal-50') {
        grid.forEach(function (cells) {
          var label = cells[0];
          var v = num(cells[3]); // column D: % participation
          if (label && !isNaN(v) && v >= 50) rows.push([label, Math.round(v)]);
        });
      }
      return rows;
    }

    function renderBoard(i, rows) {
      var board = BOARDS[i];
      var ol = document.getElementById('board-rows-' + i);
      if (!ol) return;
      if (board.theme === 'done') ol.closest('.board').classList.add('board--done');
      rows.sort(function (a, b) { return b[1] - a[1]; });
      if (board.limit) rows = rows.slice(0, board.limit);
      ol.innerHTML = '';
      if (!rows.length) {
        var empty = document.createElement('li');
        empty.className = 'board-empty';
        empty.textContent = board.mode === 'goal-50'
          ? 'No classes have reached 50% yet — be the first!'
          : 'Standings coming soon!';
        ol.appendChild(empty);
        return;
      }
      rows.forEach(function (row, idx) {
        var li = document.createElement('li');
        li.className = 'board-row' + (idx === 0 ? ' first' : '');
        var rank = document.createElement('span');
        if (board.rank === 'check') {
          rank.className = 'board-rank check';
          rank.textContent = '\u2713';
        } else {
          rank.className = 'board-rank';
          rank.textContent = idx + 1;
        }
        var label = document.createElement('span');
        label.className = 'board-label';
        // Prefix bare class years; leave names like "Avant Garde" as-is
        label.textContent = /^\d{4}$/.test(row[0]) ? 'Class of ' + row[0] : row[0];
        var value = document.createElement('span');
        value.className = 'board-value' + (board.format === 'plus' ? ' plus' : '');
        if (board.format === 'plus') {
          value.textContent = '+' + row[1].toLocaleString();
        } else if (board.format === 'percent') {
          value.textContent = row[1] + '%';
        } else {
          value.textContent = row[1].toLocaleString();
        }
        li.appendChild(rank); li.appendChild(label); li.appendChild(value);
        ol.appendChild(li);
      });
    }

    BOARDS.forEach(function (b, i) {
      var titleEl = document.getElementById('board-title-' + i);
      if (titleEl) titleEl.textContent = b.title;
      if (b.url.indexOf('PASTE') !== -1) {
        renderBoard(i, []); // gid not wired yet → friendly empty state
        return;
      }
      fetch(b.url + '&t=' + Date.now())
        .then(function (r) { return r.text(); })
        .then(function (text) { renderBoard(i, extractRows(parseGrid(text), b)); })
        .catch(function () { renderBoard(i, []); });
    });

    // ── Animated gold fireworks straddling the white/dark seam ───────────────
    (function () {
      var canvas = document.getElementById('fireworks');
      if (!canvas) return;
      var reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)');
      var ctx = canvas.getContext('2d');
      var dpr = Math.min(window.devicePixelRatio || 1, 2);
      var particles = [];
      var running = false;
      var visible = true;
      var nextBurst = 0;

      // Gold and light blue only
      var BLUES = ['#00C1FD', '#5BD7FF', '#9FE9FF', '#7FD4F2'];
      var GOLDS = ['#FFE9A8', '#F3C969', '#E3B968', '#FFF6DC', '#D9A441'];
      var SEAM = 0.55; // canvas y-fraction where white meets dark (matches translateY(-55%))

      function resize() {
        var r = canvas.getBoundingClientRect();
        canvas.width  = Math.floor(r.width * dpr);
        canvas.height = Math.floor(r.height * dpr);
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      }

      function burst(cx, cy, scale) {
        scale = scale || 1;
        var count = Math.floor((44 + Math.random() * 28) * scale);
        var r = canvas.getBoundingClientRect();
        // Even mix of gold and light blue, anywhere
        var palette = (Math.random() < 0.5) ? BLUES : GOLDS;
        var color = palette[Math.floor(Math.random() * palette.length)];
        for (var i = 0; i < count; i++) {
          var angle = (Math.PI * 2 * i) / count + Math.random() * 0.2;
          var speed = (0.8 + Math.random() * 2.2) * scale; // smaller burst radius
          particles.push({
            x: cx, y: cy,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            life: 0,
            ttl: 1600 + Math.random() * 1400, // long-lived, willow-style
            color: color,
            size: 1.8 + Math.random() * 1.6,  // fat, juicy sparks
            trail: []                          // tail of recent positions
          });
        }
        // White-hot core flash at the burst center
        particles.push({ flash: true, x: cx, y: cy, life: 0, ttl: 320, r: 9 * scale });
      }

      function randomBurst(now) {
        var r = canvas.getBoundingClientRect();
        burst(
          r.width * (0.06 + Math.random() * 0.88),
          r.height * (0.18 + Math.random() * 0.72), // below the heading; margin for spark spread
          1
        );
        nextBurst = now + 1100 + Math.random() * 1900;
      }

      var lastT = 0;
      function frame(now) {
        if (!running) return;
        var dt = lastT ? Math.min(now - lastT, 50) : 16;
        lastT = now;

        var r = canvas.getBoundingClientRect();
        ctx.clearRect(0, 0, r.width, r.height);

        if (now >= nextBurst && particles.length < 450) randomBurst(now);

        for (var i = particles.length - 1; i >= 0; i--) {
          var p = particles[i];
          p.life += dt;
          if (p.life >= p.ttl) { particles.splice(i, 1); continue; }
          var fade = 1 - (p.life / p.ttl);

          if (p.flash) {
            // expanding white-hot core that dies fast
            var fr = p.r * (0.6 + 0.8 * (p.life / p.ttl));
            var g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, fr);
            g.addColorStop(0, 'rgba(255,255,245,' + (0.95 * fade) + ')');
            g.addColorStop(1, 'rgba(255,240,200,0)');
            ctx.globalAlpha = 1;
            ctx.fillStyle = g;
            ctx.beginPath();
            ctx.arc(p.x, p.y, fr, 0, Math.PI * 2);
            ctx.fill();
            continue;
          }

          p.trail.push({ x: p.x, y: p.y });
          if (p.trail.length > 24) p.trail.shift();
          p.x += p.vx * dt * 0.06;
          p.y += p.vy * dt * 0.06;
          p.vy += 0.0017 * dt;          // stronger gravity → drooping willow trails
          p.vx *= 0.997; p.vy *= 0.997; // more drag → rays slow, then fall

          // raindrop streak: tapers from a point at the tail
          // to full width at the head (segment widths ramp up)
          if (p.trail.length > 1) {
            ctx.globalAlpha = fade; // whole drop shares one opacity
            ctx.strokeStyle = p.color;
            ctx.lineCap = 'round';
            var pts = p.trail.concat([{ x: p.x, y: p.y }]);
            var n = pts.length;
            for (var t = 0; t < n - 1; t += 2) {
              var t2 = Math.min(t + 2, n - 1);
              ctx.lineWidth = Math.max(0.2, p.size * ((t2) / (n - 1)));
              ctx.beginPath();
              ctx.moveTo(pts[t].x, pts[t].y);
              ctx.lineTo(pts[t2].x, pts[t2].y);
              ctx.stroke();
            }
          }
        }
        ctx.globalAlpha = 1;
        requestAnimationFrame(frame);
      }

      function start() {
        if (running || reduceMotion.matches || !visible || document.hidden) return;
        running = true;
        lastT = 0;
        nextBurst = performance.now() + 300;
        requestAnimationFrame(frame);
      }
      function stop() { running = false; }

      resize();
      window.addEventListener('resize', resize);
      document.addEventListener('visibilitychange', function () {
        document.hidden ? stop() : start();
      });
      if (typeof IntersectionObserver !== 'undefined') {
        new IntersectionObserver(function (entries) {
          visible = entries[0].isIntersecting;
          visible ? start() : stop();
        }).observe(canvas);
      }
      if (reduceMotion.addEventListener) {
        reduceMotion.addEventListener('change', function () {
          reduceMotion.matches ? stop() : start();
        });
      }
      start();
    })();

    // ── Report height to parent page for iframe auto-resize ──────────────────
    // Measure the content element, NOT documentElement.scrollHeight —
    // scrollHeight is always >= the viewport, so reporting it creates a
    // feedback loop with the parent's +32px padding (infinite growth).
    var lastHeight = 0;
    function postHeight() {
      var b = document.querySelector('.band');
      var h = Math.ceil(b.getBoundingClientRect().bottom +
              (parseFloat(getComputedStyle(b).marginBottom) || 0));
      if (h !== lastHeight && h > 0) {
        lastHeight = h;
        window.parent.postMessage({ type: 'fnye-countdown-height', height: h }, '*');
      }
    }

    window.addEventListener('load', postHeight);
    window.addEventListener('resize', postHeight);
    if (document.fonts && document.fonts.ready) {
      document.fonts.ready.then(postHeight);
    }
    if (typeof ResizeObserver !== 'undefined') {
      new ResizeObserver(postHeight).observe(document.body);
    }
  </script>
</body>
</html>
