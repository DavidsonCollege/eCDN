<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Doug Hicks' Fiscal New Year's Eve Countdown</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Inter:wght@400;500;600;700&family=Archivo:wght@300;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --davidson-red: #D42121;
      --davidson-black: #0F1012;
      --night:    #1B2A4A;
      --gold:     #E3B968;
      --gray-10:  #6A6869;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: transparent;
      color: var(--davidson-black);
      font-family: 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif;
    }

    .content {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 0.5rem;
      width: 100%;
    }

    .heading {
      font-family: 'Archivo', 'Helvetica Neue', sans-serif;
      font-size: clamp(1.25rem, 3vw, 2rem);
      font-weight: 700;
      letter-spacing: 0.3em;
      text-indent: 0.3em;
      text-transform: uppercase;
      color: var(--night);
      margin-bottom: clamp(1.25rem, 3.5vw, 2.5rem);
    }

    .countdown {
      display: flex;
      gap: clamp(1rem, 3vw, 2.25rem);
      align-items: baseline;
      justify-content: center;
      flex-wrap: wrap;
      width: 100%;
    }

    .sep {
      font-family: 'Archivo', 'Helvetica Neue', sans-serif;
      font-size: clamp(2.4rem, 9vw, 5.4rem);
      font-weight: 300;
      line-height: 1;
      color: var(--davidson-red);
      align-self: center;
      transform: translateY(-0.35em); /* optically center on the digits, above the labels */
    }

    .unit {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(0.6rem, 1.5vw, 1rem);
    }

    .number {
      font-family: 'Archivo', 'Helvetica Neue', sans-serif;
      font-size: clamp(4rem, 15vw, 9rem);
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      line-height: 1;
      min-width: 2ch;
      text-align: center;
      transition: transform 0.1s ease;
      /* Marquee-letter look, minus the bulbs:
         red face, gold edge, dark dimensional drop */
      color: var(--davidson-red); /* solid brand red — no outline, no shadow */
    }

    .number.tick { transform: scale(1.04); }

    .label {
      font-size: clamp(0.85rem, 2.2vw, 1.15rem);
      font-weight: 700;
      letter-spacing: 0.3em;
      text-indent: 0.3em; /* visually centers letterspaced caps */
      text-transform: uppercase;
      color: var(--night);
    }

    .art {
      display: block;
      height: auto;
    }

    .band {
      position: relative;
      width: min(92%, 1100px);  /* inset box with white margins, not full-bleed */
      margin: clamp(2.5rem, 6vw, 4.5rem) auto clamp(1.5rem, 4vw, 3rem);
      background:
        radial-gradient(ellipse at 80% 0%, rgba(227, 185, 104, 0.08), transparent 55%),
        linear-gradient(160deg, #16223D 0%, #0C1526 100%);
      padding: clamp(3.5rem, 8vw, 6rem) 1rem clamp(4rem, 9vw, 6.5rem);
      box-shadow: 0 8px 30px rgba(15, 16, 18, 0.18);
    }

    .art-lockup {
      width: clamp(340px, 90%, 1060px);
      margin: 0 auto;
      position: relative;
      mix-blend-mode: screen; /* PNG has a baked black bg; screen makes black invisible on the dark band */
    }

    /* Animated fireworks bridging the seam: the canvas straddles the
       band's top edge — half over the white zone, half over the dark */
    .fireworks {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 760px;            /* tall enough to reach up behind the clock */
      transform: translateY(-78%); /* ~78% above the seam, 22% in the band */
      pointer-events: none;
    }

    .message {
      font-family: 'Great Vibes', Georgia, cursive;
      font-size: clamp(2.5rem, 7vw, 4rem);
      color: var(--davidson-red);
      display: none;
    }

    /* Mobile: 2×2 grid of the four units, tightened up */
    @media (max-width: 640px) {
      .countdown {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem 0.5rem;
        justify-items: center;
      }
      .unit { min-width: 0; gap: 0.35rem; }
      .sep { display: none; }
      .heading { margin-bottom: 1rem; }
      .content { padding-top: 0.25rem; }
      .band { margin-top: 1.75rem; }
    }

    @media (prefers-reduced-motion: reduce) {
      .number { transition: none; }
    }
  </style>
</head>
<body>

  <div class="content">

    <h2 class="heading" id="heading">Countdown to</h2>

    <div class="countdown" id="countdown">
      <div class="unit">
        <span class="number" id="days">--</span>
        <span class="label">Days</span>
      </div>
      <span class="sep" aria-hidden="true">:</span>
      <div class="unit">
        <span class="number" id="hours">--</span>
        <span class="label">Hours</span>
      </div>
      <span class="sep" aria-hidden="true">:</span>
      <div class="unit">
        <span class="number" id="minutes">--</span>
        <span class="label">Minutes</span>
      </div>
      <span class="sep" aria-hidden="true">:</span>
      <div class="unit">
        <span class="number" id="seconds">--</span>
        <span class="label">Seconds</span>
      </div>
    </div>

    <p class="message" id="message">Happy Fiscal New Year!</p>
  </div>

  <!-- ── Dark band: the neon lockup's home ─────────────────────────────
       The band is CSS (full-width, resolution-independent); only the
       lockup and fireworks are images. Export both as transparent PNG @2x.
       The fireworks straddle the white/dark seam to bridge the two zones. -->
  <div class="band">
    <canvas class="fireworks" id="fireworks" aria-hidden="true"></canvas>
    <img class="art art-lockup" src="NYFE-Lockup.png" alt="The Fiscal New Year" onerror="this.style.display='none'">
  </div>

  <script>
    const TARGET = new Date('2026-07-01T00:00:00');

    const elDays    = document.getElementById('days');
    const elHours   = document.getElementById('hours');
    const elMinutes = document.getElementById('minutes');
    const elSeconds = document.getElementById('seconds');
    const elMessage = document.getElementById('message');
    const elCountdown = document.getElementById('countdown');

    function pad(n) { return String(n).padStart(2, '0'); }

    function tick(el, val) {
      if (el.textContent !== val) {
        el.classList.remove('tick');
        void el.offsetWidth; // reflow
        el.classList.add('tick');
        el.textContent = val;
      }
    }

    function update() {
      const now  = new Date();
      const diff = TARGET - now;

      if (diff <= 0) {
        elCountdown.style.display = 'none';
        document.getElementById('heading').style.display = 'none';
        elMessage.style.display   = 'block';
        return;
      }

      const totalSec = Math.floor(diff / 1000);
      const secs  = totalSec % 60;
      const mins  = Math.floor(totalSec / 60) % 60;
      const hrs   = Math.floor(totalSec / 3600) % 24;
      const days  = Math.floor(totalSec / 86400);

      tick(elDays,    pad(days));
      tick(elHours,   pad(hrs));
      tick(elMinutes, pad(mins));
      tick(elSeconds, pad(secs));
    }

    update();
    setInterval(update, 1000);

    // ── Animated gold fireworks straddling the white/dark seam ───────────────
    (function () {
      var canvas = document.getElementById('fireworks');
      if (!canvas) return;
      var reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)');
      var ctx = canvas.getContext('2d');
      var dpr = Math.min(window.devicePixelRatio || 1, 2);
      var particles = [];
      var running = false;
      var visible = true;
      var nextBurst = 0;

      // Gold and light blue only
      var BLUES = ['#00C1FD', '#5BD7FF', '#9FE9FF', '#7FD4F2'];
      var GOLDS = ['#FFE9A8', '#F3C969', '#E3B968', '#FFF6DC', '#D9A441'];
      var SEAM = 0.78; // canvas y-fraction where white meets dark (matches translateY(-78%))

      function resize() {
        var r = canvas.getBoundingClientRect();
        canvas.width  = Math.floor(r.width * dpr);
        canvas.height = Math.floor(r.height * dpr);
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      }

      function burst(cx, cy, scale) {
        scale = scale || 1;
        var count = Math.floor((44 + Math.random() * 28) * scale);
        var r = canvas.getBoundingClientRect();
        // Even mix of gold and light blue, anywhere
        var palette = (Math.random() < 0.5) ? BLUES : GOLDS;
        var color = palette[Math.floor(Math.random() * palette.length)];
        for (var i = 0; i < count; i++) {
          var angle = (Math.PI * 2 * i) / count + Math.random() * 0.2;
          var speed = (0.8 + Math.random() * 2.2) * scale; // smaller burst radius
          particles.push({
            x: cx, y: cy,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            life: 0,
            ttl: 1600 + Math.random() * 1400, // long-lived, willow-style
            color: color,
            size: 1.8 + Math.random() * 1.6,  // fat, juicy sparks
            trail: []                          // tail of recent positions
          });
        }
        // White-hot core flash at the burst center
        particles.push({ flash: true, x: cx, y: cy, life: 0, ttl: 320, r: 9 * scale });
      }

      function randomBurst(now) {
        var r = canvas.getBoundingClientRect();
        burst(
          r.width * (0.06 + Math.random() * 0.88),
          r.height * (0.08 + Math.random() * 0.84), // anywhere: white zone and dark band
          1
        );
        nextBurst = now + 1100 + Math.random() * 1900;
      }

      var lastT = 0;
      function frame(now) {
        if (!running) return;
        var dt = lastT ? Math.min(now - lastT, 50) : 16;
        lastT = now;

        var r = canvas.getBoundingClientRect();
        ctx.clearRect(0, 0, r.width, r.height);

        if (now >= nextBurst && particles.length < 450) randomBurst(now);

        for (var i = particles.length - 1; i >= 0; i--) {
          var p = particles[i];
          p.life += dt;
          if (p.life >= p.ttl) { particles.splice(i, 1); continue; }
          var fade = 1 - (p.life / p.ttl);

          if (p.flash) {
            // expanding white-hot core that dies fast
            var fr = p.r * (0.6 + 0.8 * (p.life / p.ttl));
            var g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, fr);
            g.addColorStop(0, 'rgba(255,255,245,' + (0.95 * fade) + ')');
            g.addColorStop(1, 'rgba(255,240,200,0)');
            ctx.globalAlpha = 1;
            ctx.fillStyle = g;
            ctx.beginPath();
            ctx.arc(p.x, p.y, fr, 0, Math.PI * 2);
            ctx.fill();
            continue;
          }

          p.trail.push({ x: p.x, y: p.y });
          if (p.trail.length > 24) p.trail.shift();
          p.x += p.vx * dt * 0.06;
          p.y += p.vy * dt * 0.06;
          p.vy += 0.0017 * dt;          // stronger gravity → drooping willow trails
          p.vx *= 0.997; p.vy *= 0.997; // more drag → rays slow, then fall

          // curved trail
          if (p.trail.length > 1) {
            ctx.globalAlpha = fade * 0.55;
            ctx.strokeStyle = p.color;
            ctx.lineWidth = p.size;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.beginPath();
            ctx.moveTo(p.trail[0].x, p.trail[0].y);
            for (var t = 1; t < p.trail.length; t++) ctx.lineTo(p.trail[t].x, p.trail[t].y);
            ctx.lineTo(p.x, p.y);
            ctx.stroke();
          }
          // bright head
          ctx.globalAlpha = fade;
          ctx.fillStyle = '#FFFDF2';
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size * 0.9, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.globalAlpha = 1;
        requestAnimationFrame(frame);
      }

      function start() {
        if (running || reduceMotion.matches || !visible || document.hidden) return;
        running = true;
        lastT = 0;
        nextBurst = performance.now() + 300;
        requestAnimationFrame(frame);
      }
      function stop() { running = false; }

      resize();
      window.addEventListener('resize', resize);
      document.addEventListener('visibilitychange', function () {
        document.hidden ? stop() : start();
      });
      if (typeof IntersectionObserver !== 'undefined') {
        new IntersectionObserver(function (entries) {
          visible = entries[0].isIntersecting;
          visible ? start() : stop();
        }).observe(canvas);
      }
      if (reduceMotion.addEventListener) {
        reduceMotion.addEventListener('change', function () {
          reduceMotion.matches ? stop() : start();
        });
      }
      start();
    })();

    // ── Report height to parent page for iframe auto-resize ──────────────────
    // Measure the content element, NOT documentElement.scrollHeight —
    // scrollHeight is always >= the viewport, so reporting it creates a
    // feedback loop with the parent's +32px padding (infinite growth).
    var lastHeight = 0;
    function postHeight() {
      var b = document.querySelector('.band');
      var h = Math.ceil(b.getBoundingClientRect().bottom +
              (parseFloat(getComputedStyle(b).marginBottom) || 0));
      if (h !== lastHeight && h > 0) {
        lastHeight = h;
        window.parent.postMessage({ type: 'fnye-countdown-height', height: h }, '*');
      }
    }

    window.addEventListener('load', postHeight);
    window.addEventListener('resize', postHeight);
    if (document.fonts && document.fonts.ready) {
      document.fonts.ready.then(postHeight);
    }
    if (typeof ResizeObserver !== 'undefined') {
      new ResizeObserver(postHeight).observe(document.body);
    }
  </script>
</body>
</html>
